<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civiora - Annual Accounts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f4f4;
            color: #333;
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            padding: 15px 25px;
            text-align: right;
            background: #fff;
            border-bottom: 1px solid #ddd;
        }
        .navbar a {
            color: #b8860b;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            margin-left: 25px;
            cursor: pointer;
            transition: 0.3s;
        }
        .navbar a:hover { color: #1a1a1a; }

        /* HEADER */
        .top {
            text-align: center;
            padding: 45px 20px;
            background: linear-gradient(135deg, #bd9537 0%, #f9f295 50%, #b8860b 100%);
            color: #1a1a1a;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .top h1 { font-size: 2.1rem; font-weight: 900; letter-spacing: 1px; }
        .top p { font-size: 0.95rem; margin-top: 6px; font-weight: 600; opacity: 0.8; }

        /* CONTENT */
        .content {
            max-width: 1050px;
            margin: 35px auto;
            padding: 0 20px 50px;
        }

        /* FISCAL YEAR LABEL */
        .fy-label {
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            color: #b8860b;
            background: #fffdf5;
            border: 1px solid #e2b13c;
            border-radius: 20px;
            display: inline-block;
            padding: 6px 20px;
            margin: 0 auto 30px;
            display: block;
            width: fit-content;
            letter-spacing: 1px;
        }

        /* SUMMARY CARDS */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 20px;
            margin-bottom: 35px;
        }

        .summary-card {
            background: #fff;
            border-radius: 14px;
            padding: 24px 20px;
            text-align: center;
            border: 1px solid #eee;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            animation: fadeUp 0.5s ease;
            transition: transform 0.2s;
        }
        .summary-card:hover { transform: translateY(-4px); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .summary-card .icon { font-size: 32px; margin-bottom: 10px; }
        .summary-card .label { font-size: 12px; color: #999; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .summary-card .value { font-size: 24px; font-weight: 900; margin-top: 6px; }
        .summary-card .sub { font-size: 12px; color: #aaa; margin-top: 4px; }

        .card-income .value  { color: #2e7d32; }
        .card-expense .value { color: #c62828; }
        .card-balance-pos .value { color: #1565c0; }
        .card-balance-neg .value { color: #c62828; }
        .card-maintenance .value { color: #b8860b; }
        .card-booking .value { color: #6a1b9a; }

        /* SECTION HEADING */
        .section-title {
            font-size: 17px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, #e2b13c, transparent);
            border-radius: 2px;
        }

        /* TABLES */
        .table-card {
            background: #fff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            margin-bottom: 30px;
        }

        table { width: 100%; border-collapse: collapse; }
        thead { background: linear-gradient(135deg, #bd9537, #b8860b); color: #fff; }
        thead th { padding: 14px 20px; text-align: left; font-size: 13px; font-weight: 700; letter-spacing: 0.5px; }
        tbody tr { border-bottom: 1px solid #f5f5f5; transition: background 0.2s; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #fffdf5; }
        tbody td { padding: 13px 20px; font-size: 14px; }
        tbody td:last-child { font-weight: 700; text-align: right; }
        tfoot { background: #fffdf5; border-top: 2px solid #e2b13c; }
        tfoot td { padding: 14px 20px; font-weight: 800; font-size: 15px; }
        tfoot td:last-child { text-align: right; color: #b8860b; }

        .badge { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; }
        .badge-income  { background: #e8f5e9; color: #2e7d32; }
        .badge-expense { background: #ffebee; color: #c62828; }

        /* NET BALANCE BAR */
        .net-bar {
            background: #fff;
            border-radius: 14px;
            padding: 28px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            border: 2px solid #e2b13c;
            flex-wrap: wrap;
            gap: 15px;
        }
        .net-bar .net-label { font-size: 18px; font-weight: 800; color: #1a1a1a; }
        .net-bar .net-value { font-size: 30px; font-weight: 900; }
        .net-pos { color: #2e7d32; }
        .net-neg { color: #c62828; }

        /* LOADING */
        .loading {
            text-align: center;
            padding: 60px;
            color: #b8860b;
            font-size: 16px;
            font-weight: 700;
        }

        @media (max-width: 600px) {
            .summary-cards { grid-template-columns: 1fr 1fr; }
            .net-bar { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a onclick="location.href='dashboard.html'">🏠 Dashboard</a>
        <a onclick="logout()">Logout</a>
    </div>

    <div class="top">
        <h1>📊 Annual Accounts</h1>
        <p>Society Financial Overview — Civiora</p>
    </div>

    <div class="content" id="mainContent">
        <div class="loading">⏳ Loading financial data...</div>
    </div>

    <script>
        async function loadAccounts() {
            const content = document.getElementById('mainContent');

            try {
                const res = await fetch('http://localhost:8080/accounts/summary');
                const d = await res.json();

                const incomeTotal = d.totalIncome || 0;
                const expenseTotal = d.totalExpenses || 0;
                const net = d.netBalance || 0;
                const isPositive = net >= 0;

                // Build expense rows
                const expenseRows = Object.entries(d.expenses || {}).map(([name, amt]) => `
                    <tr>
                        <td>${name}</td>
                        <td><span class="badge badge-expense">Expense</span></td>
                        <td>₹${fmt(amt)}</td>
                    </tr>
                `).join('');

                content.innerHTML = `
                    <div class="fy-label">📅 Financial Year: April 2025 – March 2026</div>

                    <!-- SUMMARY CARDS -->
                    <div class="summary-cards">
                        <div class="summary-card card-income" style="animation-delay:0s">
                            <div class="icon">💰</div>
                            <div class="label">Total Income</div>
                            <div class="value">₹${fmt(incomeTotal)}</div>
                            <div class="sub">Maintenance + Bookings</div>
                        </div>
                        <div class="summary-card card-maintenance" style="animation-delay:0.08s">
                            <div class="icon">🏠</div>
                            <div class="label">Maintenance Collected</div>
                            <div class="value">₹${fmt(d.maintenanceIncome)}</div>
                            <div class="sub">${d.maintenanceCount} payment(s)</div>
                        </div>
                        <div class="summary-card card-booking" style="animation-delay:0.16s">
                            <div class="icon">🏢</div>
                            <div class="label">Booking Revenue</div>
                            <div class="value">₹${fmt(d.bookingIncome)}</div>
                            <div class="sub">Facilities booked</div>
                        </div>
                        <div class="summary-card card-expense" style="animation-delay:0.24s">
                            <div class="icon">💸</div>
                            <div class="label">Total Expenses</div>
                            <div class="value">₹${fmt(expenseTotal)}</div>
                            <div class="sub">Annual outgoing</div>
                        </div>
                    </div>

                    <!-- INCOME TABLE -->
                    <div class="section-title">💰 Income Breakdown</div>
                    <div class="table-card">
                        <table>
                            <thead>
                                <tr><th>Source</th><th>Type</th><th>Amount (₹)</th></tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>Monthly Maintenance Fees</td>
                                    <td><span class="badge badge-income">Income</span></td>
                                    <td>₹${fmt(d.maintenanceIncome)}</td>
                                </tr>
                                <tr>
                                    <td>Facility Booking Revenue</td>
                                    <td><span class="badge badge-income">Income</span></td>
                                    <td>₹${fmt(d.bookingIncome)}</td>
                                </tr>
                            </tbody>
                            <tfoot>
                                <tr>
                                    <td colspan="2">Total Income</td>
                                    <td>₹${fmt(incomeTotal)}</td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>

                    <!-- EXPENSE TABLE -->
                    <div class="section-title">💸 Expense Breakdown</div>
                    <div class="table-card">
                        <table>
                            <thead>
                                <tr><th>Expense Head</th><th>Type</th><th>Amount (₹)</th></tr>
                            </thead>
                            <tbody>${expenseRows}</tbody>
                            <tfoot>
                                <tr>
                                    <td colspan="2">Total Expenses</td>
                                    <td>₹${fmt(expenseTotal)}</td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>

                    <!-- NET BALANCE -->
                    <div class="section-title">📈 Net Balance</div>
                    <div class="net-bar">
                        <div class="net-label">
                            ${isPositive ? '✅ Society has a Surplus this year' : '⚠️ Society has a Deficit this year'}
                        </div>
                        <div class="net-value ${isPositive ? 'net-pos' : 'net-neg'}">
                            ${isPositive ? '+' : ''}₹${fmt(net)}
                        </div>
                    </div>
                `;
            } catch (err) {
                document.getElementById('mainContent').innerHTML = `
                    <div class="loading">❌ Could not load financial data. Make sure the server is running.</div>
                `;
            }
        }

        function fmt(num) {
            return Number(num || 0).toLocaleString('en-IN', { maximumFractionDigits: 0 });
        }

        function logout() {
            localStorage.removeItem('userId');
            localStorage.removeItem('role');
            window.location.href = 'login.html';
        }

        loadAccounts();
    </script>
</body>
</html>
