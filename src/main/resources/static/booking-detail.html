<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civiora - Book Facility</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            padding: 15px;
            text-align: right;
            background-color: #ffffff;
            border-bottom: 1px solid #ddd;
        }

        .navbar a {
            color: #b8860b;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            margin-right: 25px;
            transition: 0.3s;
            cursor: pointer;
        }

        .navbar a:hover {
            color: #1a1a1a;
        }

        /* HEADER */
        .top {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(135deg, #bd9537 0%, #f9f295 50%, #b8860b 100%);
            color: #1a1a1a;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .top h1 {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .top p {
            font-size: 1rem;
            margin-top: 8px;
            font-weight: 600;
        }

        /* CONTENT */
        .content {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* DETAIL CARD */
        .detail-card {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid #eee;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .detail-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-bottom: 3px solid #bd9537;
        }

        .detail-body {
            padding: 30px;
        }

        .detail-body h2 {
            font-size: 26px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .detail-body .description {
            font-size: 15px;
            color: #555;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        /* INFO GRID */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }

        .info-box {
            background: #fffdf5;
            border: 1px solid #e2b13c;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .info-box .label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .info-box .value {
            font-size: 20px;
            font-weight: 800;
            color: #1a1a1a;
            margin-top: 4px;
        }

        .info-box .value.full {
            color: #c62828;
        }

        .info-box .value.available {
            color: #2e7d32;
        }

        /* FORM */
        .booking-form {
            border-top: 1px solid #eee;
            padding-top: 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 700;
            color: #444;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
            background: #fff;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #bd9537;
            outline: none;
            background: #fffdf5;
            box-shadow: 0 0 0 3px rgba(189, 149, 55, 0.15);
        }

        /* BUTTONS */
        .btn-row {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 800;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #555;
            border: 2px solid #ddd;
        }

        .btn-cancel:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .btn-confirm {
            background: linear-gradient(135deg, #bd9537 0%, #f9f295 50%, #b8860b 100%);
            color: #1a1a1a;
            box-shadow: 0 4px 15px rgba(184, 134, 11, 0.4);
        }

        .btn-confirm:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(184, 134, 11, 0.6);
        }

        .btn-confirm:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* NOTE */
        .note-bar {
            text-align: center;
            padding: 12px 20px;
            background: #fff5f5;
            border: 1px solid #ffcdd2;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 13px;
            color: #c62828;
            font-weight: 600;
        }

        /* NOTIFICATION — replaced by toast below */

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            padding: 13px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: #2e7d32;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            z-index: 9999;
            transform: translateY(80px);
            opacity: 0;
            transition: 0.35s ease;
            max-width: 360px;
        }
        .toast.show  { transform: translateY(0); opacity: 1; }
        .toast.error { background: #c62828; }
        .toast.info  { background: #b8860b; }

        /* SPINNER */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #1a1a1a;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* CONFIRMATION MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-box {
            background: #fff;
            border-radius: 16px;
            max-width: 450px;
            width: 100%;
            padding: 35px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        .modal-box h3 {
            font-size: 22px;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .modal-box p {
            font-size: 14px;
            color: #666;
            margin-bottom: 6px;
        }

        .modal-box .price-tag {
            font-size: 28px;
            font-weight: 900;
            color: #b8860b;
            margin: 15px 0;
        }

        .modal-box .modal-note {
            font-size: 12px;
            color: #c62828;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .modal-btns {
            display: flex;
            gap: 15px;
        }

        .modal-btns .btn {
            flex: 1;
        }

        .btn-no {
            background: #f0f0f0;
            color: #555;
            border: 2px solid #ddd;
        }

        .btn-yes {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: #fff;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
        }

        .btn-yes:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(40, 167, 69, 0.6);
        }

        @media (max-width: 600px) {
            .top h1 {
                font-size: 1.6rem;
            }

            .detail-card img {
                height: 180px;
            }

            .info-grid {
                grid-template-columns: 1fr 1fr;
            }

            .btn-row,
            .modal-btns {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <div class="toast" id="toast"></div>

    <div class="navbar">
        <a onclick="location.href='booking.html'">← Back to Facilities</a>
        <a onclick="location.href='dashboard.html'">🏠 Dashboard</a>
        <a onclick="logout()">Logout</a>
    </div>

    <div class="top">
        <h1 id="pageTitle">🏢 Book Facility</h1>
        <p id="pageSubtitle">Select your preferred date and time slot</p>
    </div>

    <div class="content">
        <div class="detail-card">
            <img id="facilityImage" src="" alt="Facility">
            <div class="detail-body">
                <h2 id="facilityName"></h2>
                <p class="description" id="facilityDesc"></p>

                <div class="info-grid">
                    <div class="info-box">
                        <div class="label">Capacity</div>
                        <div class="value" id="capacityValue"></div>
                    </div>
                    <div class="info-box">
                        <div class="label">Price</div>
                        <div class="value" id="priceValue"></div>
                    </div>
                    <div class="info-box">
                        <div class="label">Booked</div>
                        <div class="value" id="bookedValue">--</div>
                    </div>
                    <div class="info-box">
                        <div class="label">Available</div>
                        <div class="value available" id="availableValue">--</div>
                    </div>
                </div>

                <div class="booking-form">
                    <div class="form-group">
                        <label>📅 Select Date</label>
                        <input type="date" id="bookingDate" onchange="checkAvailability()">
                    </div>

                    <div class="form-group">
                        <label>⏰ Select Start Time</label>
                        <select id="bookingTime" onchange="checkAvailability()">
                            <option value="">-- Choose a slot --</option>
                            <option value="06:00 AM">06:00 AM</option>
                            <option value="07:00 AM">07:00 AM</option>
                            <option value="08:00 AM">08:00 AM</option>
                            <option value="09:00 AM">09:00 AM</option>
                            <option value="10:00 AM">10:00 AM</option>
                            <option value="11:00 AM">11:00 AM</option>
                            <option value="12:00 PM">12:00 PM</option>
                            <option value="01:00 PM">01:00 PM</option>
                            <option value="02:00 PM">02:00 PM</option>
                            <option value="03:00 PM">03:00 PM</option>
                            <option value="04:00 PM">04:00 PM</option>
                            <option value="05:00 PM">05:00 PM</option>
                            <option value="06:00 PM">06:00 PM</option>
                            <option value="07:00 PM">07:00 PM</option>
                            <option value="08:00 PM">08:00 PM</option>
                            <option value="09:00 PM">09:00 PM</option>
                        </select>
                    </div>

                    <div class="form-group" id="leavingTimeGroup" style="display:none;">
                        <label>⏰ Select Leaving Time</label>
                        <select id="leavingTime" onchange="checkAvailability()">
                            <option value="">-- Choose leaving time --</option>
                            <option value="07:00 AM">07:00 AM</option>
                            <option value="08:00 AM">08:00 AM</option>
                            <option value="09:00 AM">09:00 AM</option>
                            <option value="10:00 AM">10:00 AM</option>
                            <option value="11:00 AM">11:00 AM</option>
                            <option value="12:00 PM">12:00 PM</option>
                            <option value="01:00 PM">01:00 PM</option>
                            <option value="02:00 PM">02:00 PM</option>
                            <option value="03:00 PM">03:00 PM</option>
                            <option value="04:00 PM">04:00 PM</option>
                            <option value="05:00 PM">05:00 PM</option>
                            <option value="06:00 PM">06:00 PM</option>
                            <option value="07:00 PM">07:00 PM</option>
                            <option value="08:00 PM">08:00 PM</option>
                            <option value="09:00 PM">09:00 PM</option>
                            <option value="10:00 PM">10:00 PM</option>
                        </select>
                    </div>

                    <div class="btn-row">
                        <button class="btn btn-cancel" onclick="location.href='booking.html'">Cancel</button>
                        <button class="btn btn-confirm" id="confirmBtn" onclick="showConfirmModal()" disabled>Confirm
                            Booking</button>
                    </div>
                </div>

                <div class="note-bar">
                    ⚠️ The booking cannot be cancelled and is Non-refundable.
                </div>
            </div>
        </div>
    </div>

    <!-- CONFIRMATION MODAL -->
    <div id="confirmModal" class="modal-overlay" onclick="if(event.target.id==='confirmModal') closeConfirmModal()">
        <div class="modal-box">
            <h3>✅ Confirm Your Booking</h3>
            <p id="modalSummary"></p>
            <div class="price-tag" id="modalPrice"></div>
            <p class="modal-note">⚠️ This amount will be deducted from your balance. Non-refundable.</p>
            <div class="modal-btns">
                <button class="btn btn-no" onclick="closeConfirmModal()">No</button>
                <button class="btn btn-yes" id="yesBtn" onclick="processBooking()">Yes, Book Now</button>
            </div>
        </div>
    </div>

    <script>
        const FACILITIES = {
            party_hall: { name: 'Party Hall', image: 'party_hall.png', description: 'Elegant banquet hall perfect for birthdays, anniversaries, and festive gatherings. Equipped with stage, lighting, and AC. Ideal for group events with family and friends.', capacity: 1, capacityLabel: '1 Group', price: 2000, isGroup: true },
            games_club: { name: 'Games Club', image: 'games_club.png', description: 'Indoor games room with table tennis, carrom, chess, and foosball. Great for unwinding and socializing with fellow residents.', capacity: 15, capacityLabel: '15 People', price: 100, isGroup: false },
            pool: { name: 'Swimming Pool', image: 'swimming_pool.png', description: 'Crystal-clear outdoor pool with sun loungers. Open daily with lifeguard on duty. Perfect for a refreshing swim!', capacity: 20, capacityLabel: '20 People', price: 150, isGroup: false },
            gym: { name: 'Gym & Fitness Center', image: 'gym.png', description: 'Fully equipped gym with treadmills, weights, and cardio machines. Stay fit with world-class equipment and a motivating environment.', capacity: 30, capacityLabel: '30 People', price: 100, isGroup: false },
            sports_court: { name: 'Sports Court', image: 'sports_court.png', description: 'Multi-sport court for badminton, basketball, and tennis. Floodlit for evening sessions. Great for friendly matches!', capacity: 1, capacityLabel: '1 Group', price: 500, isGroup: true }
        };

        let currentFacility = null;
        let currentAvailability = null;

        // ──────────────────────────────────────────────────────────────────────
        // TOAST
        // ──────────────────────────────────────────────────────────────────────
        let _toastTimer;
        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show' + (type === 'error' ? ' error' : type === 'info' ? ' info' : '');
            clearTimeout(_toastTimer);
            _toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
        }

        // ──────────────────────────────────────────────────────────────────────
        // HELPER: convert "06:00 AM" → "06:00"  |  "01:00 PM" → "13:00"
        // Enables string comparison for 24h times (alphabetical = numeric).
        // ──────────────────────────────────────────────────────────────────────
        function to24h(timeStr) {
            if (!timeStr) return '';
            const [timePart, period] = timeStr.trim().split(' ');
            let [hours, minutes] = timePart.split(':').map(Number);
            if (period === 'PM' && hours !== 12) hours += 12;
            if (period === 'AM' && hours === 12) hours = 0;
            return String(hours).padStart(2, '0') + ':' + String(minutes).padStart(2, '0');
        }

        // ──────────────────────────────────────────────────────────────────────
        // HELPER: derive endTime for capacity-based (non-group) facilities
        // Rule: 1 hour slot
        // ──────────────────────────────────────────────────────────────────────
        function addOneHour(time24) {
            if (!time24) return '';
            const [h, m] = time24.split(':').map(Number);
            const total = h * 60 + m + 60;
            return String(Math.floor(total / 60) % 24).padStart(2, '0') + ':' + String(total % 60).padStart(2, '0');
        }

        // ──────────────────────────────────────────────────────────────────────
        // INIT
        // ──────────────────────────────────────────────────────────────────────
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const facilityId = params.get('facility');

            if (!facilityId || !FACILITIES[facilityId]) {
                location.href = 'booking.html';
                return;
            }

            currentFacility = { id: facilityId, ...FACILITIES[facilityId] };

            // Set today as min date (use local date, not UTC, to avoid off-by-one for IST users)
            const now = new Date();
            const today = now.getFullYear() + '-' +
                String(now.getMonth() + 1).padStart(2, '0') + '-' +
                String(now.getDate()).padStart(2, '0');
            document.getElementById('bookingDate').min = today;

            renderFacilityDetails();

            // Show leaving time field for group bookings
            if (currentFacility.isGroup) {
                document.getElementById('leavingTimeGroup').style.display = 'block';
            }
        };

        function renderFacilityDetails() {
            const f = currentFacility;
            document.getElementById('pageTitle').textContent = '🏢 ' + f.name;
            document.getElementById('facilityName').textContent = f.name;
            document.getElementById('facilityDesc').textContent = f.description;
            document.getElementById('facilityImage').src = f.image;
            document.getElementById('facilityImage').alt = f.name;
            document.getElementById('capacityValue').textContent = f.capacityLabel;
            document.getElementById('priceValue').textContent = '₹' + f.price;
        }

        // ──────────────────────────────────────────────────────────────────────
        // CHECK AVAILABILITY + TIME-RANGE CONFLICT
        //
        // Layer 1 (frontend): validates inputs, checks leaving > start for groups.
        // Layer 2 (frontend → backend): calls /bookings/conflict-check for range overlap.
        // Layer 3 (backend POST): @Transactional re-checks before saving.
        // ──────────────────────────────────────────────────────────────────────
        async function checkAvailability() {
            const date = document.getElementById('bookingDate').value;
            const time = document.getElementById('bookingTime').value;
            const leavingTime = document.getElementById('leavingTime').value;
            const confirmBtn = document.getElementById('confirmBtn');
            const isGroup = currentFacility.isGroup;

            if (!date || !time || (isGroup && !leavingTime)) {
                document.getElementById('bookedValue').textContent = '--';
                document.getElementById('availableValue').textContent = '--';
                document.getElementById('availableValue').className = 'value available';
                confirmBtn.disabled = true;
                return;
            }

            // ── Frontend validation: leaving time must be after start time ──
            if (isGroup && leavingTime) {
                const timeSlots = ['06:00 AM','07:00 AM','08:00 AM','09:00 AM','10:00 AM','11:00 AM',
                                   '12:00 PM','01:00 PM','02:00 PM','03:00 PM','04:00 PM','05:00 PM',
                                   '06:00 PM','07:00 PM','08:00 PM','09:00 PM','10:00 PM'];
                if (timeSlots.indexOf(leavingTime) <= timeSlots.indexOf(time)) {
                    showToast('⚠️ Leaving time must be after start time', 'error');
                    confirmBtn.disabled = true;
                    return;
                }
            }

            try {
                // ── Capacity check (existing endpoint) ──
                const res = await fetch(`http://localhost:8080/bookings/availability?facility=${currentFacility.id}&date=${date}&time=${encodeURIComponent(time)}`);
                const data = await res.json();
                currentAvailability = data;

                document.getElementById('bookedValue').textContent = data.booked;
                document.getElementById('availableValue').textContent = data.available;

                if (data.isFull) {
                    document.getElementById('availableValue').textContent = 'FULL';
                    document.getElementById('availableValue').className = 'value full';
                    confirmBtn.disabled = true;
                    return;
                }
                document.getElementById('availableValue').className = 'value available';

                // ── Time-range conflict check ──
                const start24 = to24h(time);
                const end24   = isGroup ? to24h(leavingTime) : addOneHour(start24);

                const cRes  = await fetch(
                    `http://localhost:8080/bookings/conflict-check?facility=${currentFacility.id}&date=${date}&startTime=${start24}&endTime=${end24}`
                );
                const cData = await cRes.json();

                if (cData.conflict) {
                    showToast('🚫 This time slot is already booked. Please select a different time.', 'error');
                    confirmBtn.disabled = true;
                } else {
                    confirmBtn.disabled = false;
                }

            } catch (err) {
                showToast('⚠️ Error checking availability', 'error');
            }
        }

        // ──────────────────────────────────────────────────────────────────────
        // CONFIRMATION MODAL
        // ──────────────────────────────────────────────────────────────────────
        function showConfirmModal() {
            const date = document.getElementById('bookingDate').value;
            const time = document.getElementById('bookingTime').value;
            const leavingTime = document.getElementById('leavingTime').value;
            const f = currentFacility;

            const formattedDate = new Date(date).toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

            let timeLine = `⏰ ${time}`;
            if (f.isGroup && leavingTime) {
                timeLine = `⏰ ${time} → ${leavingTime}`;
            }

            document.getElementById('modalSummary').innerHTML =
                `<b>${f.name}</b><br>📅 ${formattedDate}<br>${timeLine}`;
            document.getElementById('modalPrice').textContent = '₹' + f.price;
            document.getElementById('confirmModal').style.display = 'flex';
        }

        function closeConfirmModal() {
            document.getElementById('confirmModal').style.display = 'none';
        }

        // ──────────────────────────────────────────────────────────────────────
        // GO TO PAYMENT PAGE
        // Passes startTime + endTime (24h) as URL params so payment.html
        // can forward them to POST /bookings for the backend conflict guard.
        // ──────────────────────────────────────────────────────────────────────
        function processBooking() {
            const userId = localStorage.getItem('userId');
            const date = document.getElementById('bookingDate').value;
            const time = document.getElementById('bookingTime').value;

            if (!userId) {
                showToast('⚠️ Please login first!', 'error');
                setTimeout(() => { location.href = 'login.html'; }, 1500);
                return;
            }

            const leavingTime = document.getElementById('leavingTime').value;
            const timeDisplay = currentFacility.isGroup && leavingTime ? `${time} - ${leavingTime}` : time;

            // Derive 24h range
            const start24 = to24h(time);
            const end24   = currentFacility.isGroup && leavingTime
                            ? to24h(leavingTime)
                            : addOneHour(start24);

            const url = `payment.html?amount=${currentFacility.price}&facility=${currentFacility.id}`
                      + `&date=${date}&time=${encodeURIComponent(timeDisplay)}`
                      + `&startTime=${encodeURIComponent(start24)}&endTime=${encodeURIComponent(end24)}`
                      + `&type=booking`;
            window.location.href = url;
        }

        // ──────────────────────────────────────────────────────────────────────
        // LOGOUT
        // ──────────────────────────────────────────────────────────────────────
        function logout() {
            localStorage.removeItem('userId');
            localStorage.removeItem('role');
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>
