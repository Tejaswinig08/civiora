<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civiora - Member Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 95%;
            max-width: 450px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid #f0f0f0;
        }

        .header {
            background: linear-gradient(135deg, #bd9537 0%, #f9f295 25%, #e2b13c 50%, #f9f295 75%, #b8860b 100%);
            padding: 30px;
            text-align: center;
            border-bottom: 4px solid #a67c00;
        }

        .header h1 {
            color: #1a1a1a;
            font-size: 36px;
            letter-spacing: 3px;
            font-weight: 800;
        }

        .header p {
            color: #333;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .content {
            padding: 35px;
        }

        h2 {
            color: #333;
            margin-bottom: 8px;
            text-align: center;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 700;
            color: #444;
        }

        input {
            width: 100%;
            padding: 11px;
            border: 1.5px solid #ddd;
            border-radius: 6px;
            transition: 0.3s;
            font-size: 14px;
            background-color: #fff;
        }

        input:focus {
            border-color: #bd9537;
            outline: none;
            background-color: #fffdf5;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            margin-top: 15px;
            background: linear-gradient(135deg, #bd9537 0%, #f9f295 50%, #b8860b 100%);
            color: #1a1a1a;
            box-shadow: 0 4px 15px rgba(184, 134, 11, 0.4);
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(184, 134, 11, 0.6);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .link {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: #666;
        }

        .link a {
            color: #b8860b;
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
        }

        .link a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            text-align: center;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        /* ---- Step Transitions ---- */
        .step {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .step.hidden {
            display: none;
            opacity: 0;
            transform: translateY(15px);
        }

        .step.visible {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* ---- OTP Input Styling ---- */
        .otp-inputs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }

        .otp-inputs input {
            width: 48px;
            height: 56px;
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 0;
            transition: all 0.3s ease;
        }

        .otp-inputs input:focus {
            border-color: #bd9537;
            box-shadow: 0 0 0 3px rgba(189, 149, 55, 0.15);
            background-color: #fffdf5;
        }

        /* ---- Resend / Timer ---- */
        .resend-row {
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            color: #888;
        }

        .resend-row a {
            color: #b8860b;
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
        }

        .resend-row a:hover {
            text-decoration: underline;
        }

        .resend-row a.disabled {
            color: #ccc;
            pointer-events: none;
        }

        .email-badge {
            display: inline-block;
            background: #fffdf5;
            border: 1px solid #e2b13c;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #8b6914;
            margin-bottom: 15px;
        }

        .change-email {
            font-size: 12px;
            margin-left: 6px;
            color: #b8860b;
            cursor: pointer;
            text-decoration: none;
        }

        .change-email:hover {
            text-decoration: underline;
        }

        /* ---- Loading Spinner ---- */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #1a1a1a;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ---- Step Indicator ---- */
        .steps-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ddd;
            transition: all 0.3s ease;
        }

        .step-dot.active {
            background: #bd9537;
            transform: scale(1.2);
        }

        .step-dot.completed {
            background: #28a745;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Civiora</h1>
            <p>Build for better society living!!</p>
        </div>

        <div class="content">
            <h2>Member Login</h2>

            <div class="steps-indicator">
                <div class="step-dot active" id="dot1"></div>
                <div class="step-dot" id="dot2"></div>
            </div>

            <div id="loginMessage" class="message"></div>

            <!-- ========== STEP 1: Email Entry ========== -->
            <div id="step1" class="step visible">
                <p class="subtitle">Enter your registered email to receive a one-time password</p>
                <form id="emailForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="loginEmail" required placeholder="example@mail.com" autocomplete="email">
                    </div>
                    <button type="submit" class="btn" id="sendOtpBtn">Send OTP</button>
                </form>
            </div>

            <!-- ========== STEP 2: OTP Verification ========== -->
            <div id="step2" class="step hidden">
                <p class="subtitle">Enter the 6-digit code sent to</p>
                <div style="text-align: center;">
                    <span class="email-badge" id="emailDisplay"></span>
                    <a class="change-email" onclick="goBackToStep1()">Change</a>
                </div>

                <form id="otpForm">
                    <div class="otp-inputs" id="otpInputs">
                        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" required>
                        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" required>
                        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" required>
                        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" required>
                        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" required>
                        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" required>
                    </div>

                    <button type="submit" class="btn" id="verifyOtpBtn">Verify & Login</button>
                </form>

                <div class="resend-row">
                    <span id="resendText">Didn't receive the code? </span>
                    <a id="resendLink" class="disabled" onclick="resendOtp()">Resend OTP</a>
                    <span id="resendTimer"></span>
                </div>
            </div>

            <div class="link">
                Don't have an account? <a onclick="window.location.href='signup.html'">Sign Up</a>
            </div>
            <div class="link">
                <a onclick="window.location.href='home.html'">← Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        // ---- State ----
        let currentEmail = '';
        let resendCooldown = 0;
        let cooldownInterval = null;

        // ---- DOM Elements ----
        const emailForm = document.getElementById('emailForm');
        const otpForm = document.getElementById('otpForm');
        const sendOtpBtn = document.getElementById('sendOtpBtn');
        const verifyOtpBtn = document.getElementById('verifyOtpBtn');
        const otpInputs = document.querySelectorAll('#otpInputs input');
        const resendLink = document.getElementById('resendLink');
        const resendTimer = document.getElementById('resendTimer');

        // ---- Message Helper ----
        const showMessage = (text, type) => {
            const msg = document.getElementById("loginMessage");
            msg.innerText = text;
            msg.className = "message " + type;
        };

        const clearMessage = () => {
            const msg = document.getElementById("loginMessage");
            msg.className = "message";
            msg.innerText = "";
        };

        // ---- Step Navigation ----
        function showStep(stepNum) {
            const step1 = document.getElementById('step1');
            const step2 = document.getElementById('step2');
            const dot1 = document.getElementById('dot1');
            const dot2 = document.getElementById('dot2');

            if (stepNum === 1) {
                step1.classList.remove('hidden');
                step1.classList.add('visible');
                step2.classList.remove('visible');
                step2.classList.add('hidden');
                dot1.className = 'step-dot active';
                dot2.className = 'step-dot';
            } else {
                step1.classList.remove('visible');
                step1.classList.add('hidden');
                step2.classList.remove('hidden');
                step2.classList.add('visible');
                dot1.className = 'step-dot completed';
                dot2.className = 'step-dot active';
                // Focus first OTP input
                setTimeout(() => otpInputs[0].focus(), 400);
            }
        }

        function goBackToStep1() {
            clearMessage();
            showStep(1);
            // Clear OTP inputs
            otpInputs.forEach(inp => inp.value = '');
        }

        // ---- OTP Input Auto-advance ----
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                const val = e.target.value;
                // Allow only digits
                e.target.value = val.replace(/[^0-9]/g, '');
                if (e.target.value && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });

            // Handle paste
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasted = (e.clipboardData.getData('text') || '').replace(/[^0-9]/g, '');
                for (let i = 0; i < otpInputs.length && i < pasted.length; i++) {
                    otpInputs[i].value = pasted[i];
                }
                const nextEmpty = Math.min(pasted.length, otpInputs.length - 1);
                otpInputs[nextEmpty].focus();
            });
        });

        // ---- Resend Cooldown ----
        function startResendCooldown() {
            resendCooldown = 30;
            resendLink.classList.add('disabled');
            updateTimerDisplay();
            cooldownInterval = setInterval(() => {
                resendCooldown--;
                updateTimerDisplay();
                if (resendCooldown <= 0) {
                    clearInterval(cooldownInterval);
                    resendLink.classList.remove('disabled');
                    resendTimer.innerText = '';
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            resendTimer.innerText = resendCooldown > 0 ? ` (${resendCooldown}s)` : '';
        }

        // ---- STEP 1: Send OTP ----
        emailForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMessage();

            currentEmail = document.getElementById('loginEmail').value.trim();
            sendOtpBtn.disabled = true;
            sendOtpBtn.innerHTML = '<span class="spinner"></span>Sending...';

            try {
                const res = await fetch("http://localhost:8080/send-otp", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: currentEmail })
                });

                const data = await res.json();

                if (data.status === "success") {
                    showMessage("OTP sent to " + currentEmail, "success");
                    document.getElementById('emailDisplay').innerText = currentEmail;
                    setTimeout(() => {
                        clearMessage();
                        showStep(2);
                        startResendCooldown();
                    }, 800);
                } else {
                    showMessage(data.message || "Failed to send OTP", "error");
                }
            } catch (err) {
                showMessage("Connection error. Check if Spring Boot is running on 8080.", "error");
            } finally {
                sendOtpBtn.disabled = false;
                sendOtpBtn.innerHTML = 'Send OTP';
            }
        });

        // ---- STEP 2: Verify OTP ----
        otpForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMessage();

            const otp = Array.from(otpInputs).map(i => i.value).join('');
            if (otp.length !== 6) {
                showMessage("Please enter all 6 digits", "error");
                return;
            }

            verifyOtpBtn.disabled = true;
            verifyOtpBtn.innerHTML = '<span class="spinner"></span>Verifying...';

            try {
                const res = await fetch("http://localhost:8080/verify-otp", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: currentEmail, otp: otp })
                });

                const data = await res.json();

                if (data.status === "success") {
                    showMessage("Access Granted! Redirecting...", "success");
                    localStorage.setItem("userId", data.userId);
                    localStorage.setItem("role", data.role);
                    
                    const userRole = (data.role || "").toLowerCase();
                    const adminRoles = ["admin", "secretary", "treasurer", "chairman"];
                    const targetPage = adminRoles.includes(userRole) ? "admin.html" : "dashboard.html";

                    setTimeout(() => {
                        window.location.href = targetPage + "?v=" + Date.now();
                    }, 1000);
                } else {
                    showMessage(data.message || "Invalid OTP", "error");
                    otpInputs.forEach(i => i.value = '');
                    otpInputs[0].focus();
                }
            } catch (err) {
                showMessage("Connection error. Check if Spring Boot is running on 8080.", "error");
            } finally {
                verifyOtpBtn.disabled = false;
                verifyOtpBtn.innerHTML = 'Verify & Login';
            }
        });

        // ---- Resend OTP ----
        async function resendOtp() {
            if (resendCooldown > 0) return;
            clearMessage();
            resendLink.classList.add('disabled');

            try {
                const res = await fetch("http://localhost:8080/send-otp", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: currentEmail })
                });

                const data = await res.json();
                if (data.status === "success") {
                    showMessage("New OTP sent!", "success");
                    otpInputs.forEach(i => i.value = '');
                    otpInputs[0].focus();
                    startResendCooldown();
                } else {
                    showMessage(data.message || "Failed to resend OTP", "error");
                    resendLink.classList.remove('disabled');
                }
            } catch (err) {
                showMessage("Connection error.", "error");
                resendLink.classList.remove('disabled');
            }
        }
    </script>
</body>

</html>
