<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civiora – My Complaints</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f4f4;
            color: #333;
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            padding: 15px;
            text-align: right;
            background: #fff;
            border-bottom: 1px solid #ddd;
        }
        .navbar a {
            color: #b8860b;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            margin-right: 25px;
            cursor: pointer;
            transition: 0.3s;
        }
        .navbar a:hover { color: #1a1a1a; }

        /* HEADER */
        .top {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(135deg, #bd9537 0%, #f9f295 50%, #b8860b 100%);
            color: #1a1a1a;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .top h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: 2px; }
        .top p  { font-size: 1rem; font-weight: 600; margin-top: 8px; }

        .content {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* FORM CARD */
        .form-card {
            background: #fff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            border: 1px solid #eee;
            margin-bottom: 35px;
        }
        .form-card h2 {
            font-size: 20px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 22px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0e5c0;
        }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #555;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 11px 13px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
            background: #fff;
        }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #b8860b;
            background: #fffdf5;
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 800;
            font-size: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #bd9537 0%, #f9f295 50%, #b8860b 100%);
            color: #1a1a1a;
            box-shadow: 0 4px 15px rgba(184,134,11,0.3);
            transition: all 0.3s ease;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(184,134,11,0.5); }

        /* COMPLAINTS LIST */
        .list-section h2 {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 18px;
            color: #1a1a1a;
        }

        .complaint-item {
            background: #fff;
            border-radius: 13px;
            padding: 20px 22px;
            margin-bottom: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            border-left: 5px solid #ddd;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            animation: fadeIn 0.4s ease;
        }
        .complaint-item:hover { transform: translateX(4px); box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
        .complaint-item.resolved { border-left-color: #2e7d32; background: #f1fff4; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .complaint-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }
        .complaint-subject {
            font-size: 16px;
            font-weight: 800;
            color: #1a1a1a;
        }
        .badge-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

        .badge {
            padding: 3px 11px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        /* Priority badges */
        .badge-low    { background: #e8f5e9; color: #2e7d32; }
        .badge-medium { background: #fff3e0; color: #e65100; }
        .badge-high   { background: #ffebee; color: #c62828; }
        /* Status badges */
        .badge-pending  { background: #f5f5f5; color: #757575; }
        .badge-approved { background: #e3f2fd; color: #1565c0; }
        .badge-resolved { background: #e8f5e9; color: #2e7d32; }

        .complaint-message {
            font-size: 14px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .complaint-date { font-size: 12px; color: #aaa; }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #bbb;
        }
        .empty-state .icon { font-size: 55px; margin-bottom: 12px; }
        .empty-state p { font-size: 15px; color: #999; }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            padding: 13px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: #2e7d32;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            z-index: 9999;
            transform: translateY(80px);
            opacity: 0;
            transition: 0.35s ease;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { background: #c62828; }

        @media (max-width: 600px) {
            .top h1 { font-size: 1.6rem; }
            .complaint-header { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="toast" id="toast"></div>

    <div class="navbar">
        <a onclick="location.href='dashboard.html'">🏠 Dashboard</a>
        <a onclick="logout()">Logout</a>
    </div>

    <div class="top">
        <h1>📋 My Complaints</h1>
        <p>Submit and track your society complaints</p>
    </div>

    <div class="content">
        <!-- SUBMIT FORM -->
        <div class="form-card">
            <h2>📝 Submit a New Complaint</h2>
            <div class="form-group">
                <label>Subject</label>
                <input type="text" id="subject" placeholder="e.g. Water leakage in corridor">
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea id="message" placeholder="Describe your complaint in detail..."></textarea>
            </div>
            <div class="form-group">
                <label>Priority</label>
                <select id="priority">
                    <option value="LOW">🟢 Low</option>
                    <option value="MEDIUM" selected>🟡 Medium</option>
                    <option value="HIGH">🔴 High</option>
                </select>
            </div>
            <button class="btn-submit" onclick="submitComplaint()">Submit Complaint</button>
        </div>

        <!-- COMPLAINTS LIST -->
        <div class="list-section">
            <h2>📂 My Submitted Complaints</h2>
            <div id="complaintsList">
                <div class="empty-state"><div class="icon">⏳</div><p>Loading complaints...</p></div>
            </div>
        </div>
    </div>

    <script>
        const userId   = localStorage.getItem('userId');
        const userName = localStorage.getItem('userName') || 'Resident';

        if (!userId) { location.href = 'login.html'; }

        // ── Submit ────────────────────────────────────────────────────────────
        async function submitComplaint() {
            const subject  = document.getElementById('subject').value.trim();
            const message  = document.getElementById('message').value.trim();
            const priority = document.getElementById('priority').value;

            if (!subject || !message) {
                return showToast('Please fill in all fields.', 'error');
            }

            try {
                const res = await fetch('http://localhost:8080/complaints', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: parseInt(userId), senderName: userName, subject, message, priority })
                });

                if (res.ok) {
                    showToast('✅ Complaint submitted!');
                    document.getElementById('subject').value  = '';
                    document.getElementById('message').value  = '';
                    document.getElementById('priority').value = 'MEDIUM';
                    loadComplaints();
                } else {
                    showToast('Error submitting complaint.', 'error');
                }
            } catch {
                showToast('Cannot connect to server.', 'error');
            }
        }

        // ── Load ──────────────────────────────────────────────────────────────
        async function loadComplaints() {
            try {
                const res  = await fetch(`http://localhost:8080/complaints/user/${userId}`);
                const list = await res.json();
                renderComplaints(list);
            } catch {
                document.getElementById('complaintsList').innerHTML =
                    '<div class="empty-state"><div class="icon">⚠️</div><p>Could not load complaints.</p></div>';
            }
        }

        function renderComplaints(list) {
            const container = document.getElementById('complaintsList');
            if (!list.length) {
                container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>No complaints submitted yet.</p></div>`;
                return;
            }
            container.innerHTML = list.map((c, i) => {
                const pClass = 'badge-' + c.priority.toLowerCase();
                const sClass = 'badge-' + c.status.toLowerCase();
                const resolved = c.status === 'RESOLVED' ? ' resolved' : '';
                return `
                <div class="complaint-item${resolved}" style="animation-delay:${i*0.05}s">
                    <div class="complaint-header">
                        <div class="complaint-subject">${esc(c.subject)}</div>
                        <div class="badge-row">
                            <span class="badge ${pClass}">${c.priority}</span>
                            <span class="badge ${sClass}">${c.status}</span>
                        </div>
                    </div>
                    <div class="complaint-message">${esc(c.message)}</div>
                    <div class="complaint-date">${fmtDT(c.createdAt)}</div>
                </div>`;
            }).join('');
        }

        // ── Helpers ───────────────────────────────────────────────────────────
        const esc   = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const fmtDT = iso => iso ? new Date(iso).toLocaleString('en-IN', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '–';

        let _tt;
        function showToast(msg, type='success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show' + (type==='error'?' error':'');
            clearTimeout(_tt);
            _tt = setTimeout(() => t.classList.remove('show'), 3500);
        }

        function logout() {
            localStorage.removeItem('userId');
            localStorage.removeItem('role');
            location.href = 'login.html';
        }

        // ── Init ──────────────────────────────────────────────────────────────
        window.onload = loadComplaints;
    </script>
</body>
</html>
