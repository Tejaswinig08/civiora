<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civiora - Facility Booking</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            padding: 15px;
            text-align: right;
            background-color: #ffffff;
            border-bottom: 1px solid #ddd;
        }
        .navbar a {
            color: #b8860b;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            margin-right: 25px;
            transition: 0.3s;
            cursor: pointer;
        }
        .navbar a:hover { color: #1a1a1a; }

        /* HEADER */
        .top {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(135deg, #bd9537 0%, #f9f295 50%, #b8860b 100%);
            color: #1a1a1a;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .top h1 {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 2px;
        }
        .top p {
            font-size: 1rem;
            margin-top: 8px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* CONTENT */
        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* FACILITY GRID */
        .facility-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 30px;
        }

        /* FACILITY CARD */
        .facility-card {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            border: 1px solid #eee;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeUp 0.5s ease;
        }
        .facility-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(184, 134, 11, 0.2);
            border-color: #bd9537;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .facility-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 3px solid #bd9537;
        }

        .card-body {
            padding: 22px;
        }

        .card-body h3 {
            font-size: 20px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .card-body .description {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
            min-height: 42px;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .meta-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .tag-capacity {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .tag-price {
            background: #fffdf5;
            color: #b8860b;
            border: 1px solid #e2b13c;
        }

        .tag-full {
            background: #ffebee;
            color: #c62828;
            font-weight: 800;
        }

        .tag-type {
            background: #e3f2fd;
            color: #1565c0;
            font-size: 11px;
        }

        .btn-book {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 800;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #bd9537 0%, #f9f295 50%, #b8860b 100%);
            color: #1a1a1a;
            box-shadow: 0 4px 15px rgba(184, 134, 11, 0.3);
        }
        .btn-book:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(184, 134, 11, 0.5);
        }
        .btn-book.disabled {
            background: #e0e0e0;
            color: #999;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* NOTE */
        .note-bar {
            text-align: center;
            padding: 14px 20px;
            background: #fff5f5;
            border: 1px solid #ffcdd2;
            border-radius: 10px;
            margin-bottom: 30px;
            font-size: 13px;
            color: #c62828;
            font-weight: 600;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .top h1 { font-size: 1.6rem; }
            .facility-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a onclick="location.href='dashboard.html'">🏠 Dashboard</a>
        <a onclick="logout()">Logout</a>
    </div>

    <div class="top">
        <h1>🏢 Facility Booking</h1>
        <p>Book society amenities for your convenience</p>
    </div>

    <div class="content">
        <div class="note-bar">
            ⚠️ The booking cannot be cancelled and is Non-refundable.
        </div>

        <div class="facility-grid" id="facilityGrid">
            <!-- Cards injected by JS -->
        </div>
    </div>

    <script>
        const FACILITIES = [
            {
                id: 'party_hall',
                name: 'Party Hall',
                image: 'party_hall.png',
                description: 'Elegant banquet hall perfect for birthdays, anniversaries, and festive gatherings. Equipped with stage, lighting, and AC.',
                capacity: 1,
                capacityLabel: '1 Group / Slot',
                price: 2000,
                type: 'Group Booking'
            },
            {
                id: 'games_club',
                name: 'Games Club',
                image: 'games_club.png',
                description: 'Indoor games room with table tennis, carrom, chess, and foosball. Great for unwinding after a long day!',
                capacity: 15,
                capacityLabel: '15 People / Slot',
                price: 100,
                type: 'Individual Booking'
            },
            {
                id: 'pool',
                name: 'Swimming Pool',
                image: 'swimming_pool.png',
                description: 'Crystal-clear outdoor pool with sun loungers. Open daily with lifeguard on duty during operating hours.',
                capacity: 20,
                capacityLabel: '20 People / Slot',
                price: 150,
                type: 'Individual Booking'
            },
            {
                id: 'gym',
                name: 'Gym & Fitness Center',
                image: 'gym.png',
                description: 'Fully equipped gym with treadmills, weights, and cardio machines. Stay fit with world-class equipment!',
                capacity: 30,
                capacityLabel: '30 People / Slot',
                price: 100,
                type: 'Individual Booking'
            },
            {
                id: 'sports_court',
                name: 'Sports Court',
                image: 'sports_court.png',
                description: 'Multi-sport court for badminton, basketball, and tennis. Floodlit for evening sessions.',
                capacity: 1,
                capacityLabel: '1 Group / Slot',
                price: 500,
                type: 'Group Booking'
            }
        ];

        function renderFacilities() {
            const grid = document.getElementById('facilityGrid');
            grid.innerHTML = FACILITIES.map((f, i) => `
                <div class="facility-card" style="animation-delay: ${i * 0.1}s">
                    <img src="${f.image}" alt="${f.name}" loading="lazy">
                    <div class="card-body">
                        <h3>${f.name}</h3>
                        <p class="description">${f.description}</p>
                        <div class="card-meta">
                            <span class="meta-tag tag-capacity">👥 ${f.capacityLabel}</span>
                            <span class="meta-tag tag-price">₹${f.price} / slot</span>
                        </div>
                        <div class="card-meta">
                            <span class="meta-tag tag-type">📋 ${f.type}</span>
                        </div>
                        <button class="btn-book" onclick="bookFacility('${f.id}')">
                            Book Now
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function bookFacility(facilityId) {
            const userId = localStorage.getItem('userId');
            if (!userId) {
                alert('Please login first!');
                location.href = 'login.html';
                return;
            }
            location.href = `booking-detail.html?facility=${facilityId}`;
        }

        function logout() {
            localStorage.removeItem('userId');
            localStorage.removeItem('role');
            window.location.href = 'login.html';
        }

        // Init
        renderFacilities();
    </script>
</body>
</html>
