<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civiora - Payment</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            padding: 15px;
            display: block;
            text-align: right;
            background-color: #ffffff;
            border-bottom: 1px solid #ddd;
        }
        .navbar a {
            color: #b8860b;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            margin-right: 25px;
            transition: 0.3s;
            cursor: pointer;
        }
        .navbar a:hover { color: #1a1a1a; }

        /* BRUSHED GOLD TOP SECTION */
        .top {
            display: block;
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(135deg, #bd9537 0%, #f9f295 50%, #b8860b 100%);
            color: #1a1a1a;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .top h1 {
            font-size: 50px;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .top p {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* PAYMENT CARD */
        .payment-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        .payment-card {
            background: #ffffff;
            border-radius: 15px;
            width: 100%;
            max-width: 440px;
            padding: 40px 35px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            border: 1px solid #eee;
            text-align: center;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .payment-card .card-icon {
            font-size: 50px;
            margin-bottom: 10px;
            display: inline-block;
            padding: 15px;
            background: #fffdf5;
            border-radius: 50%;
        }

        .payment-card h2 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .payment-card .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }

        /* FORM */
        .form-group {
            margin-bottom: 22px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 700;
            color: #444;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            background: #fff;
        }

        .form-group input:focus {
            border-color: #bd9537;
            outline: none;
            background-color: #fffdf5;
            box-shadow: 0 0 0 3px rgba(189, 149, 55, 0.15);
        }

        /* BUTTONS */
        .btn-row {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 800;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #555;
            border: 2px solid #ddd;
        }
        .btn-cancel:hover {
            background: #e0e0e0;
            border-color: #ccc;
            transform: translateY(-2px);
        }

        .btn-pay {
            background: linear-gradient(135deg, #bd9537 0%, #f9f295 50%, #b8860b 100%);
            color: #1a1a1a;
            box-shadow: 0 4px 15px rgba(184, 134, 11, 0.4);
        }
        .btn-pay:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(184, 134, 11, 0.6);
        }
        .btn-pay:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* SPINNER */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #1a1a1a;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* NOTIFICATION */
        .notification {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            padding: 16px 35px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s ease;
            z-index: 9999;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .notification.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .notification.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        /* CHAR COUNTER */
        .char-counter {
            display: block;
            text-align: right;
            font-size: 11px;
            color: #aaa;
            margin-top: 4px;
            font-weight: 600;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .top h1 { font-size: 35px; }
            .payment-card { padding: 30px 20px; }
            .btn-row { flex-direction: column; }
        }
    </style>
</head>
<body>

    <!-- Notification Banner -->
    <div id="notification" class="notification"></div>

    <div class="navbar">
        <a onclick="location.href='dashboard.html'">Dashboard</a>
        <a onclick="logout()">Logout</a>
    </div>

    <div class="top">
        <h1>💳 Payment</h1>
        <p>Pay your monthly maintenance securely</p>
    </div>

    <div class="payment-container">
        <div class="payment-card">
            <p class="subtitle">Enter the amount you wish to deposit</p>

            <form id="depositForm">
                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="depositAmount" min="1" step="1" required placeholder="Enter amount">
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="depositDescription" maxlength="60" placeholder="Enter Description..." oninput="updateCharCount()">
                    <span class="char-counter" id="charCounter">0/60</span>
                </div>

                <div class="btn-row">
                    <button type="button" class="btn btn-cancel" onclick="location.href='dashboard.html'">Cancel</button>
                    <button type="submit" class="btn btn-pay" id="payBtn">Pay</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ---- Notification Helper ----
        function showNotification(message, type) {
            const notif = document.getElementById('notification');
            notif.innerText = message;
            notif.className = 'notification ' + type;

            // Trigger reflow then show
            void notif.offsetWidth;
            notif.classList.add('show');

            // Auto-hide after 3 seconds
            setTimeout(() => {
                notif.classList.remove('show');
            }, 3000);
        }

        // ---- Char Counter ----
        function updateCharCount() {
            const desc = document.getElementById('depositDescription');
            document.getElementById('charCounter').innerText = desc.value.length + '/60';
        }

        // ---- Form Setup for Booking Checkout ----
        let isBookingCheckout = false;
        let bookingData = {};

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('type') === 'booking') {
                isBookingCheckout = true;
                bookingData = {
                    facility: params.get('facility'),
                    date: params.get('date'),
                    time: decodeURIComponent(params.get('time'))
                };

                const amountInput = document.getElementById('depositAmount');
                const descInput = document.getElementById('depositDescription');

                const amount = params.get('amount') || '';
                amountInput.value = amount;
                amountInput.readOnly = true;

                const facilityName = bookingData.facility.replace('_', ' ').toUpperCase();
                descInput.value = `Booking Payment: ${facilityName}`;
                descInput.readOnly = true;

                updateCharCount();
                document.querySelector('.subtitle').textContent = "Complete your payment to confirm the booking";
            }
        };

        // ---- Form Submit ----
        document.getElementById('depositForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const userId = localStorage.getItem('userId');
            const amountInput = document.getElementById('depositAmount');
            const descInput = document.getElementById('depositDescription');
            const payBtn = document.getElementById('payBtn');
            const form = document.getElementById('depositForm');

            const amount = parseInt(amountInput.value);
            const description = descInput.value.trim();

            if (!userId) {
                showNotification('Please login first!', 'error');
                setTimeout(() => { location.href = 'login.html'; }, 1500);
                return;
            }

            payBtn.disabled = true;
            payBtn.innerHTML = '<span class="spinner"></span>Processing...';

            try {
                if (isBookingCheckout) {
                    // Option 3: Process Booking Directly
                    const res = await fetch('http://localhost:8080/bookings', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            userId: parseInt(userId),
                            facility: bookingData.facility,
                            date: bookingData.date,
                            time: bookingData.time
                        })
                    });
                    const data = await res.json();
                    if (data.status === 'success') {
                        showNotification('Payment Successful! Booking Confirmed.', 'success');
                        setTimeout(() => { location.href = 'history.html'; }, 2000);
                    } else {
                        showNotification(data.message || 'Payment failed', 'error');
                        payBtn.disabled = false;
                        payBtn.innerHTML = 'Pay';
                    }
                } else {
                    // Standard Wallet Deposit
                    const res = await fetch('http://localhost:8080/deposit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            userId: parseInt(userId),
                            amount: amount,
                            description: description
                        })
                    });

                    const data = await res.text();
                    if (data === 'Payment Successful') {
                        form.reset();
                        updateCharCount();
                        showNotification('Payment Successful!', 'success');
                    } else {
                        showNotification(data || 'Payment failed', 'error');
                    }
                    payBtn.disabled = false;
                    payBtn.innerHTML = 'Pay';
                }
            } catch (err) {
                showNotification('Connection error. Server might be down.', 'error');
                payBtn.disabled = false;
                payBtn.innerHTML = 'Pay';
            }
        });

        // ---- Logout ----
        function logout() {
            localStorage.removeItem('userId');
            localStorage.removeItem('role');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
